<!DOCTYPE html>
<html lang="zh-Hant" style="color-scheme: light">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>我的帳號 | 仲暘有限公司</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#2a5883",
          "accent-coral": "#ff7f50",
          "background-light": "#f6f7f8",
        },
        fontFamily: { "display": ["Inter", "sans-serif"] },
        borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
      }
    }
  }
</script>
<style>
  .glass-nav {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
</style>
</head>
<body class="bg-background-light font-display min-h-screen">

<!-- ===== 導覽列 ===== -->
<header class="sticky top-0 z-50 glass-nav border-b border-primary/10 px-4 md:px-10 py-3">
  <div class="max-w-5xl mx-auto flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <img src="LOGO.png" alt="仲暘有限公司 Logo" class="h-10 w-auto object-contain"/>
      <span class="text-primary font-black text-xl hidden sm:block" id="nav-name"></span>
    </a>
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-sm text-slate-500 hover:text-primary flex items-center gap-1 transition-colors">
        <span class="material-symbols-outlined !text-base">storefront</span>
        繼續購物
      </a>
      <button onclick="doLogout()"
        class="text-sm text-slate-500 hover:text-red-500 flex items-center gap-1 transition-colors border border-slate-200 rounded-lg px-3 py-1.5">
        <span class="material-symbols-outlined !text-base">logout</span>
        登出
      </button>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-10">

  <!-- 歡迎標題 -->
  <div class="mb-8 flex items-center gap-4">
    <div class="w-14 h-14 bg-primary rounded-full flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-white !text-2xl">account_circle</span>
    </div>
    <div>
      <h1 class="text-2xl font-black text-slate-800">我的帳號</h1>
      <p id="user-email" class="text-slate-500 text-sm"></p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- 左側：收件地址 -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">location_on</span>
          <h2 class="font-bold text-slate-800">收件資訊</h2>
        </div>
        <div class="p-5 space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">姓名</label>
            <input id="prof-name" type="text" placeholder="王小明"
              class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">手機號碼</label>
            <input id="prof-phone" type="tel" placeholder="0912-345-678"
              class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">收件地址</label>
            <textarea id="prof-address" rows="2" placeholder="台北市..."
              class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 resize-none"></textarea>
          </div>
          <button onclick="saveProfile()"
            class="w-full bg-primary text-white font-bold py-2.5 rounded-lg text-sm hover:bg-primary/90 transition flex items-center justify-center gap-2">
            <span id="save-profile-icon" class="material-symbols-outlined !text-base">save</span>
            <span id="save-profile-text">儲存資料</span>
          </button>
          <p id="profile-msg" class="text-center text-xs hidden"></p>
        </div>
      </div>
    </div>

    <!-- 右側：訂單列表 -->
    <div class="lg:col-span-2">
      <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">receipt_long</span>
          <h2 class="font-bold text-slate-800">我的訂單</h2>
        </div>

        <!-- 載入中 -->
        <div id="orders-loading" class="text-center py-12 text-slate-400">
          <span class="material-symbols-outlined text-4xl">hourglass_empty</span>
          <p class="mt-2 text-sm">載入訂單中...</p>
        </div>

        <!-- 無訂單 -->
        <div id="orders-empty" class="hidden text-center py-12 text-slate-400">
          <span class="material-symbols-outlined text-5xl">shopping_bag</span>
          <p class="mt-2 font-medium">還沒有訂單記錄</p>
          <a href="index.html" class="mt-3 inline-block text-primary text-sm font-bold hover:underline">去選購 →</a>
        </div>

        <!-- 訂單列表 -->
        <div id="orders-list" class="hidden divide-y divide-slate-100"></div>
      </div>
    </div>

  </div>
</main>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 z-[999] flex items-center gap-3 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none">
  <span id="toast-icon" class="material-symbols-outlined text-green-400">check_circle</span>
  <span id="toast-msg">已儲存</span>
</div>

<script src="config.js"></script>
<script>
const { createClient } = supabase;
const sb = createClient(SITE_CONFIG.supabase.url, SITE_CONFIG.supabase.anonKey);

let currentUser = null;

// ---- 初始化 ----
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = "login.html";
    return;
  }
  currentUser = session.user;
  document.getElementById("user-email").textContent = currentUser.email;

  const c = SITE_CONFIG.company;
  document.getElementById("nav-name").textContent = c.name + c.nameSuffix;

  loadProfile();
  loadOrders();
}

// ---- 收件資料 ----
async function loadProfile() {
  const { data } = await sb
    .from("customer_profiles")
    .select("*")
    .eq("user_id", currentUser.id)
    .single();

  if (data) {
    document.getElementById("prof-name").value    = data.name    || "";
    document.getElementById("prof-phone").value   = data.phone   || "";
    document.getElementById("prof-address").value = data.address || "";
  }
}

async function saveProfile() {
  const icon = document.getElementById("save-profile-icon");
  const text = document.getElementById("save-profile-text");
  icon.textContent = "hourglass_empty";
  text.textContent = "儲存中...";

  const payload = {
    user_id: currentUser.id,
    name:    document.getElementById("prof-name").value.trim(),
    phone:   document.getElementById("prof-phone").value.trim(),
    address: document.getElementById("prof-address").value.trim(),
  };

  const { error } = await sb
    .from("customer_profiles")
    .upsert(payload, { onConflict: "user_id" });

  icon.textContent = "save";
  text.textContent = "儲存資料";

  if (error) {
    showToast("儲存失敗：" + error.message, "error");
  } else {
    showToast("收件資料已儲存！", "success");
  }
}

// ---- 訂單列表 ----
async function loadOrders() {
  const { data, error } = await sb
    .from("orders")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("created_at", { ascending: false });

  document.getElementById("orders-loading").classList.add("hidden");

  if (error || !data || data.length === 0) {
    document.getElementById("orders-empty").classList.remove("hidden");
    return;
  }

  const list = document.getElementById("orders-list");
  list.innerHTML = "";

  data.forEach(order => {
    const date = new Date(order.created_at).toLocaleDateString("zh-TW", {
      year: "numeric", month: "2-digit", day: "2-digit"
    });
    const items = (order.items || []);
    const itemSummary = items.slice(0, 2).map(i => i.name).join("、") + (items.length > 2 ? ` 等 ${items.length} 件` : "");
    const statusMap = {
      pending:   { label: "待確認", color: "bg-yellow-100 text-yellow-700" },
      confirmed: { label: "已確認", color: "bg-blue-100 text-blue-700" },
      shipped:   { label: "已出貨", color: "bg-purple-100 text-purple-700" },
      delivered: { label: "已到貨", color: "bg-green-100 text-green-700" },
      cancelled: { label: "已取消", color: "bg-red-100 text-red-600" },
    };
    const st = statusMap[order.status] || statusMap.pending;

    list.insertAdjacentHTML("beforeend", `
      <div class="px-5 py-4">
        <div class="flex items-start justify-between gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-bold text-slate-800 text-sm">${order.order_code || order.id.slice(0,8).toUpperCase()}</span>
              <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${st.color}">${st.label}</span>
            </div>
            <p class="text-xs text-slate-400 mt-0.5">${date}</p>
            <p class="text-sm text-slate-600 mt-1 truncate">${itemSummary || "（無品項資訊）"}</p>
          </div>
          <div class="text-right shrink-0">
            <p class="font-black text-primary">NT$${(order.total || 0).toLocaleString("zh-TW")}</p>
            <button onclick='reorder(${JSON.stringify(order.items || [])})'
              class="mt-1 text-xs text-primary hover:text-primary/70 font-bold border border-primary/30 rounded-lg px-2.5 py-1 hover:bg-primary/5 transition flex items-center gap-1">
              <span class="material-symbols-outlined !text-xs">refresh</span>重購
            </button>
          </div>
        </div>

        <!-- 展開品項 -->
        <div class="mt-3 bg-slate-50 rounded-lg p-3 space-y-1">
          ${items.map(i => `
            <div class="flex justify-between text-xs text-slate-500">
              <span>${i.name} × ${i.qty}</span>
              <span>NT$${(i.price * i.qty).toLocaleString("zh-TW")}</span>
            </div>
          `).join("")}
        </div>
      </div>
    `);
  });

  list.classList.remove("hidden");
}

// ---- 重購 ----
function reorder(items) {
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");
  items.forEach(item => {
    const existing = cart.find(c => c.id === item.id);
    if (existing) {
      existing.qty += item.qty;
    } else {
      cart.push({ id: item.id, name: item.name, price: item.price, qty: item.qty });
    }
  });
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "cart.html";
}

// ---- 登出 ----
async function doLogout() {
  await sb.auth.signOut();
  window.location.href = "index.html";
}

// ---- Toast ----
let toastTimer;
function showToast(msg, type) {
  const toast = document.getElementById("toast");
  const icon  = document.getElementById("toast-icon");
  document.getElementById("toast-msg").textContent = msg;
  icon.textContent  = type === "error" ? "error" : "check_circle";
  icon.className    = "material-symbols-outlined " + (type === "error" ? "text-red-400" : "text-green-400");
  toast.classList.remove("opacity-0", "translate-y-4", "pointer-events-none");
  toast.classList.add("opacity-100", "translate-y-0");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.add("opacity-0", "translate-y-4", "pointer-events-none");
    toast.classList.remove("opacity-100", "translate-y-0");
  }, 3000);
}

init();
</script>

</body>
</html>
