<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>購物車結帳 | 仲暘有限公司</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#2a5883",
          "accent-coral": "#ff7f50",
          "background-light": "#f6f7f8",
          "background-dark": "#14191e",
        },
        fontFamily: { "display": ["Inter", "sans-serif"] },
        borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  .glass-nav {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">

<!-- ========== 導覽列 ========== -->
<header class="sticky top-0 z-50 glass-nav border-b border-primary/10 px-4 md:px-10 lg:px-20 py-3">
  <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 shrink-0">
      <a href="index.html" class="flex items-center gap-3">
        <img src="LOGO.png" alt="仲暘有限公司 Logo" class="h-10 w-auto object-contain"/>
        <h1 class="text-primary font-black text-xl tracking-tight hidden sm:block">
          <span id="nav-company-name"></span><span id="nav-company-suffix" class="text-slate-700 dark:text-slate-300 font-bold"></span>
        </h1>
      </a>
    </div>
    <div class="flex items-center gap-3">
      <a href="index.html" class="text-sm text-slate-500 hover:text-primary flex items-center gap-1 transition-colors">
        <span class="material-symbols-outlined !text-base">arrow_back</span>
        繼續購物
      </a>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-10">

  <h2 class="text-3xl font-black mb-8 flex items-center gap-3">
    <span class="material-symbols-outlined text-primary">shopping_cart</span>
    購物車
  </h2>

  <!-- ===== 購物車空白狀態 ===== -->
  <div id="cart-empty" class="hidden text-center py-24">
    <span class="material-symbols-outlined text-7xl text-slate-300">remove_shopping_cart</span>
    <p class="text-slate-400 text-xl mt-4 mb-6">您的購物車是空的</p>
    <a href="index.html" class="inline-block bg-primary text-white px-8 py-3 rounded-xl font-bold hover:bg-primary/90 transition-colors">
      去選購產品
    </a>
  </div>

  <!-- ===== 購物車有商品 ===== -->
  <div id="cart-content" class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- 左：商品列表 + 顧客資訊 -->
    <div class="lg:col-span-2 space-y-6">

      <!-- 商品列表 -->
      <div class="bg-white dark:bg-slate-800 rounded-xl border border-primary/5 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700">
          <h3 class="font-bold text-lg">訂購商品</h3>
        </div>
        <div id="cart-items" class="divide-y divide-slate-100 dark:divide-slate-700">
          <!-- 由 JS 動態產生 -->
        </div>
      </div>

      <!-- 顧客資訊表單 -->
      <div class="bg-white dark:bg-slate-800 rounded-xl border border-primary/5 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700">
          <h3 class="font-bold text-lg">收件人資訊</h3>
        </div>
        <form id="checkout-form" class="p-6 space-y-5">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">姓名 <span class="text-red-500">*</span></label>
              <input id="field-name" type="text" placeholder="王小明" required
                     class="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 bg-white dark:bg-slate-700"/>
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">手機號碼 <span class="text-red-500">*</span></label>
              <input id="field-phone" type="tel" placeholder="0912-345-678" required
                     class="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 bg-white dark:bg-slate-700"/>
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">收件地址 <span class="text-red-500">*</span></label>
            <input id="field-address" type="text" placeholder="台北市信義區信義路五段7號" required
                   class="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 bg-white dark:bg-slate-700"/>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">備註</label>
            <textarea id="field-note" rows="2" placeholder="如需注意事項請填寫..."
                      class="w-full border border-slate-200 dark:border-slate-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 bg-white dark:bg-slate-700 resize-none"></textarea>
          </div>
        </form>
      </div>
    </div>

    <!-- 右：訂單摘要 + 送出 -->
    <div class="space-y-6">
      <div class="bg-white dark:bg-slate-800 rounded-xl border border-primary/5 shadow-sm overflow-hidden sticky top-24">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700">
          <h3 class="font-bold text-lg">訂單摘要</h3>
        </div>
        <div class="p-6 space-y-4">
          <div class="flex justify-between text-sm text-slate-500">
            <span>商品小計</span>
            <span id="summary-subtotal">NT$0</span>
          </div>
          <div class="flex justify-between text-sm text-slate-500">
            <span>運費</span>
            <span class="text-green-600 font-semibold">免運費</span>
          </div>
          <div class="border-t border-slate-100 dark:border-slate-700 pt-4 flex justify-between font-black text-xl">
            <span>總計</span>
            <span id="summary-total" class="text-primary">NT$0</span>
          </div>
          <button id="submit-btn" onclick="submitOrder()"
            class="w-full bg-accent-coral hover:bg-accent-coral/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-accent-coral/20 flex items-center justify-center gap-2 mt-2">
            <span class="material-symbols-outlined">shopping_bag</span>
            確認送出訂單
          </button>
          <p class="text-xs text-slate-400 text-center">送出後我們會盡快聯絡您確認訂單</p>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- ========== 成功彈窗 ========== -->
<div id="success-modal" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/50 hidden">
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-10 text-center max-w-md w-full mx-4 animate-bounce-in">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <span class="material-symbols-outlined text-green-500 !text-4xl">check_circle</span>
    </div>
    <h3 class="text-2xl font-black mb-2">訂單已送出！</h3>
    <p class="text-slate-500 mb-2">感謝您的訂購，我們會盡快聯絡您確認。</p>
    <p id="order-id-display" class="text-xs text-slate-400 mb-8 font-mono"></p>
    <a href="index.html"
       class="inline-block bg-primary text-white px-10 py-3 rounded-xl font-bold hover:bg-primary/90 transition-colors">
      返回首頁
    </a>
  </div>
</div>

<!-- ========== Toast 通知 ========== -->
<div id="toast" class="fixed bottom-6 right-6 z-[999] flex items-center gap-3 bg-red-600 text-white px-5 py-3 rounded-xl shadow-2xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none">
  <span class="material-symbols-outlined">error</span>
  <span id="toast-msg">發生錯誤</span>
</div>

<!-- ========== 載入設定檔 ========== -->
<script src="config.js"></script>

<!-- ========== Firebase SDK ========== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ---- 初始化 Firebase ----
  const app = initializeApp(SITE_CONFIG.firebase);
  const db = getFirestore(app);

  // 掛到 window 讓非 module script 也能用
  window._db = db;
  window._fbCollection = collection;
  window._fbAddDoc = addDoc;
  window._fbServerTimestamp = serverTimestamp;
  window._fbReady = true;

  // 觸發 DOMContentLoaded 後的初始化
  document.dispatchEvent(new CustomEvent("firebase-ready"));
</script>

<script>
  // ---- 公司資訊 ----
  const c = SITE_CONFIG.company;
  document.getElementById("nav-company-name").textContent   = c.name;
  document.getElementById("nav-company-suffix").textContent = " " + c.nameSuffix;

  // ---- localStorage 購物車工具 ----
  function getCart() {
    return JSON.parse(localStorage.getItem("cart") || "[]");
  }
  function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  // ---- Toast ----
  let toastTimer;
  function showToast(msg, type) {
    const toast = document.getElementById("toast");
    toast.className = toast.className.replace(/bg-\w+-\d+/, type === "error" ? "bg-red-600" : "bg-slate-900");
    document.getElementById("toast-msg").textContent = msg;
    toast.classList.remove("opacity-0", "translate-y-4", "pointer-events-none");
    toast.classList.add("opacity-100", "translate-y-0");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.classList.add("opacity-0", "translate-y-4", "pointer-events-none");
      toast.classList.remove("opacity-100", "translate-y-0");
    }, 3000);
  }

  // ---- 渲染購物車 ----
  function renderCart() {
    const cart = getCart();
    const cartEmpty   = document.getElementById("cart-empty");
    const cartContent = document.getElementById("cart-content");
    const cartItems   = document.getElementById("cart-items");

    if (cart.length === 0) {
      cartEmpty.classList.remove("hidden");
      cartContent.classList.add("hidden");
      return;
    }

    cartEmpty.classList.add("hidden");
    cartContent.classList.remove("hidden");
    cartItems.innerHTML = "";

    let subtotal = 0;
    cart.forEach(item => {
      subtotal += item.price * item.qty;
      cartItems.insertAdjacentHTML("beforeend", `
        <div class="flex items-center gap-4 px-6 py-4">
          <div class="w-16 h-16 bg-slate-100 dark:bg-slate-700 rounded-lg flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined text-slate-400 !text-3xl">inventory_2</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-slate-900 dark:text-white truncate">${item.name}</p>
            <p class="text-sm text-slate-500">NT$${item.price.toLocaleString("zh-TW")} / 件</p>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <button onclick="changeQty('${item.id}', -1)"
              class="w-8 h-8 rounded-full border border-slate-200 dark:border-slate-600 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-lg font-bold leading-none">−</button>
            <span class="w-8 text-center font-bold">${item.qty}</span>
            <button onclick="changeQty('${item.id}', 1)"
              class="w-8 h-8 rounded-full border border-slate-200 dark:border-slate-600 flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-lg font-bold leading-none">+</button>
          </div>
          <div class="text-right shrink-0 w-24">
            <p class="font-bold text-slate-900 dark:text-white">NT$${(item.price * item.qty).toLocaleString("zh-TW")}</p>
            <button onclick="removeItem('${item.id}')" class="text-xs text-red-400 hover:text-red-600 mt-1 transition-colors">移除</button>
          </div>
        </div>
      `);
    });

    const fmt = n => "NT$" + n.toLocaleString("zh-TW");
    document.getElementById("summary-subtotal").textContent = fmt(subtotal);
    document.getElementById("summary-total").textContent    = fmt(subtotal);
  }

  function changeQty(id, delta) {
    const cart = getCart();
    const item = cart.find(i => i.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) {
      const idx = cart.indexOf(item);
      cart.splice(idx, 1);
    }
    saveCart(cart);
    renderCart();
  }

  function removeItem(id) {
    const cart = getCart().filter(i => i.id !== id);
    saveCart(cart);
    renderCart();
  }

  // ---- 送出訂單 ----
  async function submitOrder() {
    const cart = getCart();
    if (cart.length === 0) {
      showToast("購物車是空的！", "error");
      return;
    }

    const name    = document.getElementById("field-name").value.trim();
    const phone   = document.getElementById("field-phone").value.trim();
    const address = document.getElementById("field-address").value.trim();
    const note    = document.getElementById("field-note").value.trim();

    if (!name || !phone || !address) {
      showToast("請填寫姓名、手機號碼與收件地址！", "error");
      return;
    }

    if (!window._fbReady) {
      showToast("系統尚未就緒，請稍後再試", "error");
      return;
    }

    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> 送出中...`;

    try {
      const db = window._db;
      const addDoc = window._fbAddDoc;
      const col = window._fbCollection;
      const ts  = window._fbServerTimestamp;

      const totalAmount = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      const orderId = "WEB-" + Date.now();

      // 寫入 website_orders（整筆訂單）
      await addDoc(col(db, "website_orders"), {
        orderId,
        customer: { name, phone, address, note },
        items: cart.map(item => ({
          itemId:    item.id,
          itemName:  item.name,
          quantity:  item.qty,
          sellPrice: item.price,
          subtotal:  item.price * item.qty,
        })),
        totalAmount,
        status: "pending",
        source: "website",
        createdAt: ts(),
      });

      // 同步寫入 sales（每個品項一筆，讓庫存系統看得到）
      for (const item of cart) {
        await addDoc(col(db, "sales"), {
          orderId,
          itemId:     "website_" + item.id,
          itemName:   item.name,
          quantity:   item.qty,
          sellPrice:  item.price,
          revenue:    item.price * item.qty,
          cost:       0,        // 網站端沒有成本資訊
          grossProfit: item.price * item.qty,
          customer:   name,
          phone,
          source:     "website",
          createdAt:  ts(),
        });
      }

      // 清空購物車
      localStorage.removeItem("cart");

      // 顯示成功彈窗
      document.getElementById("order-id-display").textContent = "訂單編號：" + orderId;
      document.getElementById("success-modal").classList.remove("hidden");

    } catch (err) {
      console.error("送出訂單失敗", err);
      showToast("送出失敗：" + (err.message || "請稍後重試"), "error");
      btn.disabled = false;
      btn.innerHTML = `<span class="material-symbols-outlined">shopping_bag</span> 確認送出訂單`;
    }
  }

  // 掛到 window 供 onclick 使用
  window.changeQty   = changeQty;
  window.removeItem  = removeItem;
  window.submitOrder = submitOrder;

  // ---- 初始化 ----
  renderCart();
</script>

</body>
</html>
